<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greet App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Flask App</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/greet">Greet</a>
            <a href="/bmi">BMI</a>
            <a href="/age">Age Calculator</a>
        </div>
    </nav>

    <main class="page-wrap">
        <div class="card">
            <h1>Greet App</h1>
            <p class="subtitle">Enter your name to receive a greeting.</p>

            <form method="POST" action="/greet" class="form-card">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <button type="submit" class="btn-primary">Say Hello</button>
            </form>
        </div>
    </main>
</body>
</html>

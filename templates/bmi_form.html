<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Flask App</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/greet">Greet</a>
            <a href="/bmi">BMI</a>
            <a href="/age">Age Calculator</a>
        </div>
    </nav>

    <main class="page-wrap">
        <div class="card">
            <h1>BMI Calculator</h1>
            <p class="subtitle">Enter your weight and height to calculate BMI.</p>

            <form method="POST" action="/bmi" class="form-card">
                <div class="form-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" id="weight" name="weight" step="0.1" placeholder="Enter your weight" required>
                </div>

                <div class="form-group">
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" name="height" step="0.1" placeholder="Enter your height" required>
                </div>

                <button type="submit" class="btn-primary">Calculate BMI</button>
            </form>
        </div>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Flask App</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/greet">Greet</a>
            <a href="/bmi">BMI</a>
            <a href="/age">Age Calculator</a>
        </div>
    </nav>

    <main class="page-wrap">
        <div class="card">
            <h1>Age Calculator</h1>
            <p class="subtitle">Enter your details to calculate age and life stage.</p>

            <form method="POST" action="/age" class="form-card">
                <div class="form-group">
                    <label for="name">Student Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="birth_year">Birth Year</label>
                    <input type="number" id="birth_year" name="birth_year" placeholder="e.g. 2005" required>
                </div>

                <button type="submit" class="btn-primary">Calculate Age</button>
            </form>
        </div>
    </main>
</body>
</html>
